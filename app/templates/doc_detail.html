{% extends "base.html" %}
{% block title %}{{ doc.title }} - Docs - TEE Hub{% endblock %}

{% block content %}
<div class="animate-in">
    <!-- Toolbar Header -->
    <div class="sticky top-0 z-10 toolbar" style="border-bottom: 2px solid var(--c-border);">
        <div class="max-w-5xl mx-auto px-6 py-2">
            <div class="flex items-center gap-2 text-[12px]">
                <a href="/docs" class="text-dd-text-dim" style="text-decoration: underline;">Docs</a>
                {% for part in doc_path.split('/')[:-1] %}
                <span class="text-dd-text-dim">&gt;</span>
                <span class="text-dd-text-dim capitalize">{{ part }}</span>
                {% endfor %}
                <span class="text-dd-text-dim">&gt;</span>
                <span class="font-bold" style="color: #1A202C;">{{ doc.title }}</span>
            </div>
        </div>
    </div>

    <div class="max-w-5xl mx-auto px-6 py-5">
        <div class="card overflow-hidden">
            <div class="flex items-center justify-between px-4 py-2" style="background: #ECF0F6; border-bottom: 1px solid #D0D8E4;">
                <span class="text-[11px] text-dd-text-dim font-mono">{{ doc.path }}</span>
                <span class="text-[11px] text-dd-text-dim">{{ doc.modified.strftime('%b %d, %Y') }}</span>
            </div>
            <div class="px-6 py-5 bg-white">
                <div class="md-content max-w-none">{{ doc.html|safe }}</div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
