{% extends "base.html" %}
{% block title %}Not Found - TEE Hub{% endblock %}

{% block content %}
<div class="flex items-center justify-center h-full">
    <div class="text-center animate-in">
        <div class="card overflow-hidden" style="max-width: 420px;">
            <div class="win-titlebar flex items-center gap-2">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>

                <p class="text-[13px] font-bold mb-2" style="color: #1A202C;">The page cannot be displayed</p>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
