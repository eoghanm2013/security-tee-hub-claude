services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - python-app
      - node-app
      - java-app
      - php-app
    profiles:
      - apps

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-petshop}
      POSTGRES_USER: ${POSTGRES_USER:-petshop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-petshop123}
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U petshop"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - apps

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    profiles:
      - apps

  dd-agent:
    image: gcr.io/datadoghq/agent:latest
    pid: host
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_APP_KEY=${DD_APP_KEY}
      - DD_SITE=${DD_SITE:-datadoghq.com}
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=false
      - DD_PROCESS_AGENT_ENABLED=true
      - DD_SYSTEM_PROBE_ENABLED=${DD_SYSTEM_PROBE_ENABLED:-false}
      - DD_RUNTIME_SECURITY_CONFIG_ENABLED=${DD_RUNTIME_SECURITY_CONFIG_ENABLED:-false}
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_HOSTNAME=sandbox-suite
      - DD_TAGS=env:sandbox team:security-testing
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc/:/host/proc/:ro
      - /sys/fs/cgroup/:/host/sys/fs/cgroup:ro
      - /sys/kernel/debug:/sys/kernel/debug
      - ./agent/datadog.yaml:/etc/datadog-agent/datadog.yaml:ro
      - ./agent/system-probe.yaml:/etc/datadog-agent/system-probe.yaml:ro
      - ./agent/conf.d/siem-logs.yaml:/etc/datadog-agent/conf.d/siem-logs.d/conf.yaml:ro
      - siem-logs:/var/log/sandbox
    security_opt:
      - apparmor:unconfined
    cap_add:
      - SYS_ADMIN
      - SYS_RESOURCE
      - SYS_PTRACE
      - NET_ADMIN
      - NET_BROADCAST
      - IPC_LOCK
    ports:
      - "8125:8125/udp"
      - "8126:8126"

  python-app:
    build: ./apps/python-flask
    restart: on-failure
    environment:
      - DD_AGENT_HOST=dd-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=petshop-python
      - DD_ENV=sandbox
      - DD_VERSION=1.0.0
      - DD_APPSEC_ENABLED=${DD_APPSEC_ENABLED:-false}
      - DD_IAST_ENABLED=${DD_IAST_ENABLED:-false}
      - DD_APPSEC_SCA_ENABLED=${DD_APPSEC_SCA_ENABLED:-false}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-petshop}:${POSTGRES_PASSWORD:-petshop123}@postgres:5432/${POSTGRES_DB:-petshop}
      - REDIS_URL=redis://redis:6379
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dd-agent:
        condition: service_started
    labels:
      com.datadoghq.ad.logs: '[{"source":"python","service":"petshop-python"}]'
    profiles:
      - apps

  node-app:
    build: ./apps/node-express
    restart: on-failure
    environment:
      - DD_AGENT_HOST=dd-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=petshop-node
      - DD_ENV=sandbox
      - DD_VERSION=1.0.0
      - DD_APPSEC_ENABLED=${DD_APPSEC_ENABLED:-false}
      - DD_IAST_ENABLED=${DD_IAST_ENABLED:-false}
      - DD_APPSEC_SCA_ENABLED=${DD_APPSEC_SCA_ENABLED:-false}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-petshop}:${POSTGRES_PASSWORD:-petshop123}@postgres:5432/${POSTGRES_DB:-petshop}
      - REDIS_URL=redis://redis:6379
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dd-agent:
        condition: service_started
    labels:
      com.datadoghq.ad.logs: '[{"source":"nodejs","service":"petshop-node"}]'
    profiles:
      - apps

  java-app:
    build: ./apps/java-spring
    restart: on-failure
    environment:
      - DD_AGENT_HOST=dd-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=petshop-java
      - DD_ENV=sandbox
      - DD_VERSION=1.0.0
      - DD_APPSEC_ENABLED=${DD_APPSEC_ENABLED:-false}
      - DD_IAST_ENABLED=${DD_IAST_ENABLED:-false}
      - DD_APPSEC_SCA_ENABLED=${DD_APPSEC_SCA_ENABLED:-false}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/${POSTGRES_DB:-petshop}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-petshop}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-petshop123}
      - REDIS_URL=redis://redis:6379
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dd-agent:
        condition: service_started
    labels:
      com.datadoghq.ad.logs: '[{"source":"java","service":"petshop-java"}]'
    profiles:
      - apps

  php-app:
    build: ./apps/php-slim
    restart: on-failure
    environment:
      - DD_AGENT_HOST=dd-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_SERVICE=petshop-php
      - DD_ENV=sandbox
      - DD_VERSION=1.0.0
      - DD_APPSEC_ENABLED=${DD_APPSEC_ENABLED:-false}
      - DD_IAST_ENABLED=${DD_IAST_ENABLED:-false}
      - DD_APPSEC_SCA_ENABLED=${DD_APPSEC_SCA_ENABLED:-false}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-petshop}:${POSTGRES_PASSWORD:-petshop123}@postgres:5432/${POSTGRES_DB:-petshop}
      - REDIS_URL=redis://redis:6379
    ports:
      - "8004:8004"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      dd-agent:
        condition: service_started
    labels:
      com.datadoghq.ad.logs: '[{"source":"php","service":"petshop-php"}]'
    profiles:
      - apps

  siem-generator:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ./siem:/app:ro
      - siem-logs:/var/log/sandbox
    command: ["python3", "event-generator.py", "--loop", "--interval", "300"]
    depends_on:
      dd-agent:
        condition: service_started
    profiles:
      - siem

volumes:
  pgdata:
  siem-logs:
